shell /usr/bin/zsh
mouse_map right press ungrabbed paste_from_clipboard


# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

font_family      JetBrainsMono Nerd Font
font_size        11.0
disable_ligatures never

window_padding_width 15
background_opacity 0.85
background_blur 1
